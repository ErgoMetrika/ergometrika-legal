<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Documentos legales de ErgoMetrika: Términos y Condiciones y Política de Privacidad.">
<title>ErgoMetrika · Legal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf7;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-muted: #6b6b6b;
  --border: rgba(0,0,0,0.08);
  --accent: #0f6e56;
  --accent-bg: #e1f5ee;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding: 2rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  max-width: 560px;
  width: 100%;
}
.header {
  text-align: center;
  margin-bottom: 3rem;
}
.logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  background: var(--accent-bg);
  color: var(--accent);
  border-radius: 14px;
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 1.25rem;
}
.brand {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
}
.tagline {
  color: var(--text-muted);
  font-size: 15px;
}
.cards {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 1.25rem 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.15s ease, transform 0.15s ease;
}
.card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.card-icon {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  background: var(--accent-bg);
  color: var(--accent);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-icon svg {
  width: 22px;
  height: 22px;
}
.card-content {
  flex: 1;
  min-width: 0;
}
.card-title {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 2px;
}
.card-desc {
  font-size: 14px;
  color: var(--text-muted);
}
.card-arrow {
  flex-shrink: 0;
  color: var(--text-muted);
}
.card-arrow svg {
  width: 18px;
  height: 18px;
}
.footer {
  margin-top: 3rem;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.7;
}
.footer a {
  color: var(--accent);
  text-decoration: none;
}
.footer a:hover {
  text-decoration: underline;
}
@media (max-width: 480px) {
  body { padding: 1.5rem 1rem; }
  .header { margin-bottom: 2rem; }
  .brand { font-size: 22px; }
  .card { padding: 1rem 1.25rem; gap: 12px; }
  .card-title { font-size: 15px; }
}
</style>
</head>
<body>
<main class="container">
  <header class="header">
    <div class="logo" aria-hidden="true">E</div>
    <h1 class="brand">ErgoMetrika</h1>
    <p class="tagline">Documentos legales</p>
  </header>

  <nav class="cards">
    <a class="card" href="./terminos.html">
      <span class="card-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="16" y2="17"/>
          <line x1="8" y1="9" x2="10" y2="9"/>
        </svg>
      </span>
      <div class="card-content">
        <div class="card-title">Términos y Condiciones</div>
        <div class="card-desc">Reglas de uso de la aplicación</div>
      </div>
      <span class="card-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </span>
    </a>

    <a class="card" href="./privacidad.html">
      <span class="card-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </span>
      <div class="card-content">
        <div class="card-title">Política de Privacidad</div>
        <div class="card-desc">Cómo tratamos tus datos personales</div>
      </div>
      <span class="card-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </span>
    </a>
  </nav>

  <footer class="footer">
    <p>© 2026 ErgoMetrika · Julián Di Leo</p>
    <p>Buenos Aires, Argentina · <a href="mailto:soporteergometrika@gmail.com">soporteergometrika@gmail.com</a></p>
  </footer>
</main>
</body>
</html>
